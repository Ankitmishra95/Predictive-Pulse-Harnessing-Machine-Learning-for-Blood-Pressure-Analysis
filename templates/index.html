<!DOCTYPE html>
<html>
<head>
    <title>Hypertension Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Hypertension Prediction</h1>

<form action="/predict" method="post">

<input type="number" name="Gender" placeholder="Gender (0=Male,1=Female)" required>
<input type="number" name="Age" placeholder="Age (1-4)" required>
<input type="number" name="History" placeholder="History (0/1)" required>
<input type="number" name="Patient" placeholder="Patient (0/1)" required>
<input type="number" name="TakeMedication" placeholder="TakeMedication (0/1)" required>
<input type="number" name="Severity" placeholder="Severity (0-2)" required>
<input type="number" name="BreathShortness" placeholder="BreathShortness (0/1)" required>
<input type="number" name="VisualChanges" placeholder="VisualChanges (0/1)" required>
<input type="number" name="NoseBleeding" placeholder="NoseBleeding (0/1)" required>
<input type="number" name="Whendiagnoused" placeholder="WhenDiagnosed (0-2)" required>
<input type="number" name="Systolic" placeholder="Systolic BP (e.g. 120)" required>
<input type="number" name="Diastolic" placeholder="Diastolic BP (e.g. 80)" required>
<input type="number" name="ControlledDiet" placeholder="ControlledDiet (0/1)" required>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
